<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f0f0f0">
    <title>{% if page.title %}{{ page.title | escape }} · {% endif %}AJRA</title>
    <meta name="description" content="{{ page.description | default: site.description | markdownify | strip_html | normalize_whitespace | escape }}">
    <meta name="robots" content="index, follow">
    <link rel="icon" type="image/x-icon" href="{{ '/images/favicon.ico' | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/images/AJRA.png' | relative_url }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <link rel="alternate" type="application/rss+xml" title="AJRA Blog" href="{{ '/feed.xml' | absolute_url }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title | escape }}{% else %}AJRA{% endif %}">
    <meta property="og:description" content="{{ page.description | default: site.description | markdownify | strip_html | normalize_whitespace | escape }}">
    <meta property="og:image" content="{{ page.image | default: '/images/ajra-sharing.webp' | absolute_url }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
    <link href="{{ '/css/style.css' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}" rel="stylesheet" type="text/css">
</head>
<body>
    <main class="contenido blog-shell">
        <div class="container blog-container">
            <aside class="column blog-sidebar">
                <header class="sticky-column">
                    <a href="{{ '/' | relative_url }}" aria-label="Volver al inicio"><img class="avatar" src="{{ '/images/AJRA.webp' | relative_url }}" alt="AJRA" width="150" height="150"></a>
                    <h1>&lt;/AJRA&gt;</h1>
                    <h2>👨🏻‍💻 Web Developer &amp; Data Analyst</h2>
                    <nav class="blog-nav" aria-label="Navegación principal">
                        <a href="{{ '/' | relative_url }}">Inicio</a>
                        <a href="{{ '/blog/' | relative_url }}">Blog</a>
                        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
                    </nav>
                </header>
            </aside>
            <section class="column blog-main">
                {{ content }}
            </section>
        </div>
    </main>
    <footer>
        <span id="year"></span>
        <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
        &copy; Desarrollado con 🧠 &amp; 💛 por &lt;/AJRA&gt;
    </footer>
</body>
</html>
